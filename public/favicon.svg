<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black rounded background -->
  <rect width="32" height="32" rx="5" fill="#111111"/>

  <!-- Left arm of V: thick at top, tapers to bottom point -->
  <polygon points="1,3 8,3 16,29" fill="white"/>
  <!-- Right arm of V: mirror -->
  <polygon points="24,3 31,3 16,29" fill="white"/>
  <!-- Rounded bottom tip -->
  <circle cx="16" cy="28" r="2" fill="white"/>

  <!-- Orange horseshoe: vertical arms + upward semicircular arch -->
  <path d="M11 13 L11 7 A5 5 0 0 0 21 7 L21 13"
        stroke="#F97316" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
