proxy_cache_path /tmp/nomus_cache levels=1:2 keys_zone=nomus_cache:10m max_size=100m inactive=35m use_temp_path=off;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/nomus/ {
        # Cache apenas para leituras (GET/HEAD) — escrita passa direto
        set $skip_cache 0;
        if ($request_method ~* ^(POST|PUT|PATCH|DELETE)$) {
            set $skip_cache 1;
        }
        proxy_no_cache $skip_cache;
        proxy_cache_bypass $skip_cache;

        proxy_cache nomus_cache;
        proxy_cache_valid 200 30m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        proxy_cache_key "$request_uri";
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass https://live.nomus.com.br/live/;
        proxy_set_header Authorization "Basic aW50ZWdyYWRvcmVycDptOE9SQ3JUZ3VTcHFkeDE=";
        proxy_set_header Content-Type "application/json";
        proxy_set_header Accept "application/json";
        proxy_set_header Host live.nomus.com.br;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 15s;
        proxy_request_buffering on;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
