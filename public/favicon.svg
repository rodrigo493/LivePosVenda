<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black rounded background -->
  <rect width="32" height="32" rx="6" fill="#111111"/>

  <!-- V mark: thick white arms -->
  <path d="M5 5 L16 27 L27 5"
        stroke="white" stroke-width="8" fill="none"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Orange horseshoe: short vertical arms + upward arch -->
  <path d="M11 9 L11 7 A5.5 5 0 0 0 21 7 L21 9"
        stroke="#F97316" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
